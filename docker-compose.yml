services:
  ludus-ux:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ludus-ux
    restart: unless-stopped
    ports:
      - "443:3000"
      - "3000:3000"
    environment:
      # Auth: SSH host for user login + .bashrc API key reads
      - LUDUS_SSH_HOST=${LUDUS_SSH_HOST}
      - LUDUS_SSH_PORT=${LUDUS_SSH_PORT:-22}
      # Optional: IP address of the Ludus server, used when LUDUS_SSH_HOST is a hostname
      # that Docker cannot resolve (VPN-only DNS, Windows hosts file entries, etc.).
      # Set this in your .env and the container will add the mapping to /etc/hosts automatically.
      - LUDUS_SERVER_IP=${LUDUS_SERVER_IP:-}
      # Session encryption secret (change this!)
      - APP_SECRET=${APP_SECRET:-change-me-in-production}
      # Ludus API — defaults from LUDUS_SSH_HOST; override LUDUS_URL / LUDUS_ADMIN_URL in .env if needed.
      - LUDUS_URL=${LUDUS_URL:-https://${LUDUS_SSH_HOST}:8080}
      - LUDUS_ADMIN_URL=${LUDUS_ADMIN_URL:-https://${LUDUS_SSH_HOST}:8081}
      - LUDUS_VERIFY_TLS=${LUDUS_VERIFY_TLS:-false}
      # ROOT API key for Ludus v2 admin operations (user management)
      - LUDUS_ROOT_API_KEY=${LUDUS_ROOT_API_KEY:-}
      # Proxmox root SSH for pvesh / admin tunnel / privileged ops (key preferred on hardened PVE)
      - PROXMOX_SSH_USER=${PROXMOX_SSH_USER:-root}
      - PROXMOX_SSH_PASSWORD=${PROXMOX_SSH_PASSWORD:-}
      - PROXMOX_SSH_KEY_PATH=${PROXMOX_SSH_KEY_PATH:-/app/ssh/id_rsa}
      - PROXMOX_SSH_KEY_PASSPHRASE=${PROXMOX_SSH_KEY_PASSPHRASE:-}
      # GOAD integration
      - GOAD_SSH_HOST=${LUDUS_SSH_HOST}   # reuse the same server
      - GOAD_SSH_PORT=${LUDUS_SSH_PORT:-22}
      - GOAD_SSH_USER=${GOAD_SSH_USER:-}
      - GOAD_SSH_PASSWORD=${GOAD_SSH_PASSWORD:-}
      - GOAD_SSH_KEY_PATH=${GOAD_SSH_KEY_PATH:-/app/ssh/id_rsa}
      - GOAD_PATH=${GOAD_PATH:-/opt/GOAD}
      - ENABLE_GOAD=${ENABLE_GOAD:-true}
      # TLS — place your own cert.pem + key.pem in ./certificates/, or leave empty
      # and the container will auto-generate a self-signed certificate.
      # Set DISABLE_HTTPS=true to run on plain HTTP (useful for localhost testing).
      - DISABLE_HTTPS=${DISABLE_HTTPS:-false}
      - TLS_CERT_PATH=${TLS_CERT_PATH:-/app/certificates/cert.pem}
      - TLS_KEY_PATH=${TLS_KEY_PATH:-/app/certificates/key.pem}
      - TLS_HOSTNAME=${TLS_HOSTNAME:-}
      - NODE_ENV=production
    volumes:
      - ${SSH_KEY_PATH:-./ssh}:/app/ssh
      - ${DATA_DIR:-./data}:/app/data
      - ./certificates:/app/certificates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Try HTTPS first (normal mode); fall back to HTTP when DISABLE_HTTPS=true.
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1:3000/api/health 2>/dev/null || wget -q --spider http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

